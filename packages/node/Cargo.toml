[package]
name = "turbolite-node"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["serde-json"] }
napi-derive = "2"
rusqlite = "0.35"
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
turbolite = { path = "../..", default-features = false, features = ["zstd", "bundled-sqlite", "cloud", "https"] }

[build-dependencies]
napi-build = "2"
